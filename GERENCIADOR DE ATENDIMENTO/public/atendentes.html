<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendentes - Gerenciador de Atendimentos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Gerenciador de Atendimentos</h1>
        <nav class="nav-links">
            <a href="index.html">Cadastro</a>
            <a href="controle.html">Controle</a>
            <a href="atendentes.html" class="active">Atendentes</a>
        </nav>
    </header>

    <main>
        <div class="card" style="max-width: 600px; margin: 0 auto; margin-bottom: 2rem;">
            <h2 class="card-title">Novo Atendente</h2>
            <form id="form-atendente">
                <div class="form-group">
                    <label for="nome-atendente">Nome do Atendente</label>
                    <input type="text" id="nome-atendente" name="nome" placeholder="Ex: João Silva" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">
                    Salvar Atendente
                </button>
            </form>
        </div>

        <h2 class="card-title" style="max-width: 600px; margin: 0 auto 1rem auto; color: var(--color-white); border: none;">Lista de Atendentes</h2>
        <div class="attendance-grid" id="atendentes-list" style="max-width: 600px; margin: 0 auto;">
            <!-- Cards gerados via JS -->
        </div>
    </main>

    <div id="toast" class="toast">Mensagem</div>

    <script src="app.js"></script>
</body>
</html>
